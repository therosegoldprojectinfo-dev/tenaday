<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Numio — Fun daily math practice for kids</title>
<meta name="description" content="Numio is the fun, free way for kids to build real math confidence — a few minutes a day, no pressure, no hearts to lose." />
<link rel="icon" type="image/png" href="/landing/numio-mascot.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #58cc02;
    --green-dark: #46a302;
    --purple: #8b5cf6;
    --ink: #1a1a1a;
    --gray-500: #6b7280;
    --gray-200: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100dvh;
    background: #ffffff;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1120px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  /* ── Top bar — logo + wordmark, Duolingo-style ─────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .topbar img {
    width: 40px;
    height: 40px;
  }
  .topbar .wordmark {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--green);
    letter-spacing: -0.01em;
  }

  /* ── Main split ───────────────────────────────────────────────── */
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    min-height: calc(100dvh - 160px);
    flex-wrap: wrap;
  }

  .art {
    flex: 1 1 460px;
    max-width: 560px;
    /* The source illustration has generous internal padding around the
       actual artwork — pull it in with negative margin so it sits close
       to the text block instead of leaving a visual gap, same as
       Duolingo's tightly-cropped hero art. */
    margin: -40px -20px -40px 0;
  }
  .art img {
    width: 100%;
    height: auto;
    display: block;
  }

  .copy {
    flex: 1 1 380px;
    max-width: 460px;
    text-align: center;
  }
  .copy h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.25;
    color: var(--ink);
    margin: 0 0 28px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px 0;
    border-radius: 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }
  .btn-primary {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 0 var(--green-dark);
    margin-bottom: 12px;
  }
  .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }
  .btn-secondary {
    background: #fff;
    color: #1CB0F6;
    border: 2px solid var(--gray-200);
  }
  .btn-secondary:hover { background: #f8fafc; }

  /* ── Mobile — stack vertically, logo centered, art smaller, matching
       the reference mobile layout ─────────────────────────────────── */
  @media (max-width: 720px) {
    .wrap { padding: 20px 20px 40px; }
    .topbar { justify-content: center; margin-bottom: 24px; }
    main { flex-direction: column; gap: 8px; min-height: auto; padding-top: 4px; }
    .art { margin: -32px -12px -36px; max-width: 340px; }
    .copy h1 { font-size: 22px; margin-bottom: 20px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <img src="/public/numio-mascot.png" alt="" />
      <span class="wordmark">Numio</span>
    </div>

    <main>
      <div class="art">
        <img src="/public/hero-illustration.png" alt="Numio mascot with coins and a phone showing the app" />
      </div>

      <div class="copy">
        <h1>The fun, free way for kids to build real math confidence!</h1>
        <a class="btn btn-primary" href="/">GET STARTED</a>
        <a class="btn btn-secondary" href="/">I ALREADY HAVE AN ACCOUNT</a>
      </div>
    </main>
  </div>
</body>
</html>
