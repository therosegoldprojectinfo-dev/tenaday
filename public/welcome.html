<style>
  :root {
    --green: #58cc02;
    --green-dark: #46a302;
    --purple: #8b5cf6;
    --ink: #1a1a1a;
    --gray-500: #6b7280;
    --gray-200: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100dvh;
    background: #ffffff;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    padding: 150px 24px 24px;
  }

  /* ── Top bar — pinned to the actual top of the page, Duolingo-style,
       independent of the centered hero content below it ────────────── */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #ffffff;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 20px 24px;
    box-sizing: border-box;
    z-index: 10;
  }
  .topbar img {
    width: 90px;
    height: 90px;
    /* The mascot PNG has built-in transparent padding around the
       character itself — cancel it out so the icon sits genuinely
       close to the wordmark instead of leaving a visual gap. */
    margin-right: -18px;
  }
  .topbar .wordmark {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 48px;
    color: var(--green);
    letter-spacing: -0.01em;
  }

  /* ── Main split ───────────────────────────────────────────────── */
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
    padding: 24px 0;
  }

  .art {
    flex: 1 1 340px;
    max-width: 380px;
    /* The source illustration has generous internal padding around the
       actual artwork — trim the top/bottom only, so the image itself
       reads tighter, while still leaving a real, deliberate gap (via
       main's own `gap`) between the image and the text block next to it. */
    margin: -28px 0;
  }
  .art img {
    width: 100%;
    height: auto;
    display: block;
  }

  .copy {
    flex: 1 1 380px;
    max-width: 460px;
    text-align: center;
    margin-top: -50px;
  }
  .copy h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.25;
    color: var(--ink);
    margin: 0 0 28px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px 0;
    border-radius: 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }
  .btn-primary {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 0 var(--green-dark);
    margin-bottom: 12px;
  }
  .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }
  .btn-secondary {
    background: #fff;
    color: #1CB0F6;
    border: 2px solid var(--gray-200);
  }
  .btn-secondary:hover { background: #f8fafc; }

  /* ── Mobile — stack vertically, logo centered, art smaller, matching
       the reference mobile layout ─────────────────────────────────── */
  @media (max-width: 720px) {
    body { align-items: flex-start; }
    .wrap { padding: 20px; padding-top: 130px; }
    .topbar { justify-content: center; }
    .topbar img { width: 64px; height: 64px; margin-right: -13px; }
    .topbar .wordmark { font-size: 36px; }
    main {
      flex-direction: column;
      justify-content: flex-start;
      gap: 20px;
      padding: 0;
    }
    .art { margin: 48px 0 -60px; max-width: 220px; }
    .copy h1 { font-size: 22px; margin-bottom: 20px; }
    .copy { margin-top: -40px; }
  }
</style>
</head>
<body>
  <!-- Meta Pixel noscript fallback — must live in <body>, not <head>;
       an <img> isn't valid HTML directly inside a <head> <noscript>. -->
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=1028944262871292&amp;ev=PageView&amp;noscript=1"
  /></noscript>
  <div class="topbar">
    <img src="/numio-mascot.png" alt="" />
    <span class="wordmark">Numio</span>
  </div>

  <div class="wrap">
    <main>
      <div class="art">
        <img src="/hero-illustration.png" alt="Numio mascot with coins and a phone showing the app" />
      </div>

      <div class="copy">
        <h1>Help your child get better at addition — just 2–4 minutes a day.</h1>
        <a class="btn btn-primary" href="/" onclick="fbq('track', 'Lead')">GET STARTED</a>
        <a class="btn btn-secondary" href="/">I ALREADY HAVE AN ACCOUNT</a>
      </div>
    </main>
  </div>
</body>
</html>
